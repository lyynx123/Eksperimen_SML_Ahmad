name: Automated Data Preprocessing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scikit-learn

    # Kita langsung masuk ke folder preprocessing dan mengeksekusinya di sana
    - name: Run Preprocessing Script
      run: |
        cd preprocessing
        python automate_Ahmad.py

    # Karena dijalankan di dalam folder, output csv otomatis berada di dalam folder preprocessing
    - name: Commit and Push Clean Dataset
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add preprocessing/namadataset_preprocessing.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Update preprocessed dataset" && git push)
